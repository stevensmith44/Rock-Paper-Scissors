<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    

    <script>
        let choices = ['rock','paper','scissors']
        function getComputerChoice(){
            rand = Math.floor(Math.random()*3)
            return choices[rand]
        } 
        
        function getHumanChoice(){
            return prompt("Whats your weapon")
        }

        let ComputerC = getComputerChoice();
        let HumanC = getHumanChoice();

        function playRound(ComputerC,HumanC){
            if (ComputerC == HumanC){
                return alert("its a tie")
            }
            else if (ComputerC == "Rock" && HumanC == "Paper"){
                return alert("Computer won")
            }
            else if (ComputerC == "Rock" && HumanC == "Scissors"){
                return alert("You won")
            }
            else if (ComputerC == "Paper" && HumanC == "Rock"){
                return alert("Computer won")
            }
            else if (ComputerC == "Paper" && HumanC == "Scissors"){
                return alert("You won")
            }
            else if (ComputerC == "Scissors" && HumanC == "Paper"){
                return alert("Computer won")
            }
            else if (ComputerC == "Scissors" && HumanC == "Rock"){
                return alert("You won")
            }
        }
        
    </script>
</body>
</html>
